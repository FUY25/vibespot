<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="panel" id="panel">
    <div class="panel__top-edge"></div>
    <div class="panel__scanlines"></div>

    <div class="panel__content">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8.5" cy="8.5" r="6"/>
          <line x1="13" y1="13" x2="18" y2="18"/>
        </svg>
        <div class="search-input-wrapper">
          <input class="search-input" id="searchInput" type="text" placeholder="Search sessions" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <span class="ghost-suggestion" id="ghostSuggestion"></span>
          <span class="block-cursor" id="blockCursor"></span>
        </div>
        <span class="session-count" id="sessionCount"></span>
        <span class="action-hint" id="actionHint"></span>
        <img class="search-bar__tool-icon" id="searchBarIcon">
      </div>

      <div class="separator"></div>

      <div class="results" id="results"></div>

      <div class="keyboard-hints" id="keyboardHints">
        <span class="keyboard-hints__item"><kbd>↑↓</kbd> navigate</span>
        <span class="keyboard-hints__item"><kbd>↩</kbd> open</span>
        <span class="keyboard-hints__item"><kbd>⇥</kbd> live only</span>
        <span class="keyboard-hints__item"><kbd>esc</kbd> close</span>
      </div>
    </div>

    <div class="preview" id="previewCard"></div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
